name: Package VS Code Extension

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  package:
    name: ${{ matrix.vsix_target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            vsix_target: darwin-arm64
          - os: macos-13
            vsix_target: darwin-x64
          - os: ubuntu-latest
            vsix_target: linux-x64
          - os: windows-latest
            vsix_target: win32-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck extension
        run: bun run typecheck
        working-directory: ext/vscode

      - name: Package VSIX
        run: npm exec --yes @vscode/vsce package --target ${{ matrix.vsix_target }}
        working-directory: ext/vscode

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: jif-vscode-${{ matrix.vsix_target }}
          path: ext/vscode/*.vsix

  release:
    runs-on: ubuntu-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download packaged VSIX files
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Attach VSIX artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.vsix